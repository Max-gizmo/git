/* MK Cars — Dark luxury design system */
:root {
  --bg: #0a0a0a;
  --bg-elev: #141414;
  --bg-card: #1a1a1a;
  --bg-card-hover: #1f1f1f;
  --border: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.14);
  --text: #f5f5f5;
  --text-muted: #9a9a9a;
  --text-faint: #666;
  --accent: #f3c14a;
  --accent-hover: #f8cf64;
  --accent-text: #0a0a0a;
  --radius-sm: 10px;
  --radius: 16px;
  --radius-lg: 24px;
  --radius-xl: 32px;
  --shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
}

[data-theme="light"] {
  --bg: #f5f3ee;
  --bg-elev: #fffdf9;
  --bg-card: #ffffff;
  --bg-card-hover: #faf8f3;
  --border: rgba(0, 0, 0, 0.08);
  --border-strong: rgba(0, 0, 0, 0.16);
  --text: #15130f;
  --text-muted: #5a564f;
  --text-faint: #8a8680;
  --accent: #c89726;
  --accent-hover: #d6a232;
  --accent-text: #fffdf9;
  --shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Urbanist', -apple-system, BlinkMacSystemFont, sans-serif;
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

/* Layout */
.container {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 48px;
}

@media (max-width: 768px) {
  .container { padding: 0 20px; }
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: color-mix(in oklab, var(--bg) 80%, transparent);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 80px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-img {
  height: 38px;
  width: auto;
  display: block;
  /* Dark theme: invert the logo so the black mark becomes white */
  filter: invert(1) brightness(1.1);
  mix-blend-mode: screen;
}

[data-theme="light"] .logo-img {
  filter: none;
  mix-blend-mode: multiply;
}

.footer .logo-img {
  height: 36px;
}

.nav {
  display: flex;
  align-items: center;
  gap: 40px;
  font-size: 15px;
  color: var(--text-muted);
}

.nav a {
  position: relative;
  padding: 8px 0;
  transition: color .2s;
}
.nav a:hover { color: var(--text); }
.nav a.active { color: var(--text); }
.nav a.active::after {
  content: '';
  position: absolute;
  left: 50%;
  bottom: -2px;
  transform: translateX(-50%);
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 14px;
}

.icon-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  display: grid;
  place-items: center;
  color: var(--text);
  transition: all .2s;
}
.icon-btn:hover { background: var(--bg-card-hover); border-color: var(--border-strong); }
.icon-btn-accent {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-text);
}
.icon-btn-accent:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.no-scrollbar { scrollbar-width: none; }
.no-scrollbar::-webkit-scrollbar { display: none; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 26px;
  border-radius: 999px;
  border: none;
  font-weight: 600;
  font-size: 15px;
  transition: all .2s;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: var(--accent-text);
}
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }

.btn-ghost {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border-strong);
}
.btn-ghost:hover { background: var(--bg-card); }

/* Cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: all .25s;
}
.card:hover { background: var(--bg-card-hover); border-color: var(--border-strong); }

/* Section */
.section { padding: 96px 0; }
.section-tight { padding: 56px 0; }

.section-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--accent);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.section-title {
  font-size: clamp(36px, 5vw, 64px);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.05;
  margin: 0 0 16px;
}

.section-sub {
  color: var(--text-muted);
  font-size: 17px;
  max-width: 560px;
  margin: 0;
  line-height: 1.5;
}

.section-head {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 32px;
  margin-bottom: 48px;
  flex-wrap: wrap;
}

/* Image placeholder used when no real image */
.img-ph {
  background:
    repeating-linear-gradient(135deg,
      rgba(255,255,255,0.03) 0 8px,
      rgba(255,255,255,0.06) 8px 16px),
    var(--bg-card);
  display: grid;
  place-items: center;
  color: var(--text-faint);
  font-family: ui-monospace, SF Mono, Menlo, monospace;
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* Utility */
.muted { color: var(--text-muted); }
.faint { color: var(--text-faint); }
.divider { height: 1px; background: var(--border); border: 0; margin: 0; }

/* Page transitions */
.page-fade {
  animation: pageIn .35s ease;
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Footer */
.footer {
  border-top: 1px solid var(--border);
  padding: 64px 0 40px;
  margin-top: 80px;
}
.footer-grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 1fr;
  gap: 48px;
  margin-bottom: 48px;
}
.footer-col h4 {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  margin: 0 0 18px;
  font-weight: 600;
}
.footer-col a {
  display: block;
  padding: 6px 0;
  color: var(--text);
  font-size: 15px;
}
.footer-col a:hover { color: var(--accent); }
.footer-bottom {
  display: flex;
  justify-content: space-between;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  color: var(--text-faint);
  font-size: 13px;
}
.social-icons {
  display: flex;
  gap: 0;
  margin-top: auto;
  align-self: flex-end;
}
.social-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: none;
  color: var(--text-muted);
  transition: color 0.15s;
}
.social-icon:hover {
  color: var(--accent);
}
@media (max-width: 768px) {
  .footer-grid { grid-template-columns: 1fr 1fr; gap: 28px; }
  .nav { display: none; }
  .desk-only { display: none !important; }
}
.mob-only { display: none; }
@media (max-width: 768px) {
  .mob-only { display: flex; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg-card); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: var(--bg-card-hover); }
@media (max-width: 1100px) {
  .inv-grid-3 { grid-template-columns: repeat(2, 1fr) !important; }
}
@media (max-width: 720px) {
  .inv-grid-3 { grid-template-columns: 1fr !important; }
}
.inv-layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 32px;
}
.inv-cars-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
}
@media (max-width: 768px) {
  .inv-layout {
    display: block;
  }
  .inv-sidebar {
    display: none;
  }
  .inv-cars-grid {
    display: flex;
    flex-direction: row;
    overflow-x: scroll;
    scroll-snap-type: x mandatory;
    gap: 16px;
    padding: 0 20px 20px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    margin: 0 -20px;
  }
  .inv-cars-grid::-webkit-scrollbar { display: none; }
  .inv-cars-grid > * {
    flex: 0 0 82vw;
    scroll-snap-align: start;
    min-width: 0;
  }
}
</style>

// ==================== Header ====================
const TELEGRAM_TOKEN = '7121487547:AAFjMWqaODwnKGZnwfNrxtN0RaoYsjmZCes';
const OWNER_CHAT_ID = null; // will be set after bot receives first message

const Header = ({ route, onNav, theme, setTheme }) => {
  const [menuOpen, setMenuOpen] = useState(false);
  const [chatOpen, setChatOpen] = useState(false);
  const [name, setName] = useState('');
  const [msg, setMsg] = useState('');
  const [status, setStatus] = useState('idle'); // idle | sending | sent | error

  const items = [
    { label: 'Home', path: '/' },
    { label: 'Inventory', path: '/inventory' },
    { label: 'Services', path: 'services' },
    { label: 'About', path: 'about' },
    { label: 'Contact', path: 'contact' },
    { label: 'Apply Online', path: 'apply-online' },
  ];

  const isActive = (p) => {
    if (p === '/inventory') return route.startsWith('/inventory') || route.startsWith('/car/');
    if (p === '/') return route === '/';
    return false;
  };

  const handleNav = (e, path) => {
    e.preventDefault();
    setMenuOpen(false);
    if (path === 'apply-online') {
      if (route !== '/') { onNav('/'); setTimeout(() => document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' }), 150); }
      else document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' });
    } else if (path === '/' || path === '/inventory') {
      onNav(path);
    } else {
      if (route !== '/') {
        onNav('/');
        setTimeout(() => {
          document.getElementById(path)?.scrollIntoView({ behavior: 'smooth' });
        }, 150);
      } else {
        document.getElementById(path)?.scrollIntoView({ behavior: 'smooth' });
      }
    }
  };

  const sendChat = async () => {
    if (!name.trim() || !msg.trim() || status === 'sending') return;
    setStatus('sending');
    try {
      const text = `🚗 *Новое сообщение с сайта MK Cars*\n\n👤 Имя: ${name}\n💬 Сообщение: ${msg}`;
      const chatId = OWNER_CHAT_ID || await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/getUpdates`)
        .then(r => r.json()).then(d => d.result?.[0]?.message?.chat?.id);
      if (!chatId) { setStatus('error'); return; }
      const res = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: chatId, text, parse_mode: 'Markdown' }),
      });
      const data = await res.json();
      if (data.ok) { setStatus('sent'); setName(''); setMsg(''); }
      else setStatus('error');
    } catch { setStatus('error'); }
  };

  const inp = {
    width: '100%', padding: '10px 14px', borderRadius: 'var(--radius-sm)',
    background: 'var(--bg-elev)', border: '1px solid var(--border)',
    color: 'var(--text)', fontSize: 14, fontFamily: 'inherit', outline: 'none',
    boxSizing: 'border-box',
  };

  return (
    <header className="header" style={{ position: 'relative' }}>
      <div className="container header-inner">
        <MKLogo />
        <nav className="nav">
          {items.map(it => (
            <a key={it.path} href="#"
               className={isActive(it.path) ? 'active' : ''}
               style={it.path === 'apply-online' ? { color: 'var(--accent)', fontWeight: 700 } : {}}
               onClick={(e) => handleNav(e, it.path)}>
              {it.label}
            </a>
          ))}
        </nav>
        <div className="header-actions">
          <button className="icon-btn" onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} title="Тема">
            <Icon name={theme === 'dark' ? 'sun' : 'moon'} size={18} />
          </button>
          <button className="icon-btn icon-btn-accent" title="Чат" onClick={() => { setChatOpen(!chatOpen); setMenuOpen(false); setStatus('idle'); }}>
            <Icon name="chat" size={18} />
          </button>
          <button className="icon-btn mob-only" title="Меню" onClick={() => { setMenuOpen(!menuOpen); setChatOpen(false); }}>
            <Icon name={menuOpen ? 'x' : 'menu'} size={18} />
          </button>
        </div>
      </div>

      {/* Mobile nav drawer */}
      {menuOpen && (
        <div style={{
          position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 200,
          background: 'var(--bg-card)', borderBottom: '1px solid var(--border)',
          boxShadow: 'var(--shadow)',
        }}>
          {items.map(it => (
            <a key={it.path} href="#"
               onClick={(e) => handleNav(e, it.path)}
               style={{
                 display: 'block', padding: '16px 24px',
                 color: it.path === 'apply-online' ? 'var(--accent)' : isActive(it.path) ? 'var(--accent)' : 'var(--text)',
                 fontSize: 16, fontWeight: it.path === 'apply-online' ? 700 : 500,
                 borderBottom: '1px solid var(--border)',
               }}>
              {it.label}
            </a>
          ))}
        </div>
      )}

      {/* Chat popup */}
      {chatOpen && (
        <div style={{
          position: 'absolute', top: '100%', right: 16, zIndex: 200,
          width: 320, background: 'var(--bg-card)',
          border: '1px solid var(--border-strong)',
          borderRadius: 'var(--radius-lg)', boxShadow: 'var(--shadow)',
          overflow: 'hidden',
        }}>
          <div style={{ padding: '18px 20px 14px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 36, height: 36, borderRadius: '50%', background: 'color-mix(in oklab, var(--accent) 20%, transparent)', display: 'grid', placeItems: 'center', color: 'var(--accent)' }}>
              <Icon name="chat" size={18} />
            </div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 15 }}>Написать нам</div>
              <div style={{ color: 'var(--text-muted)', fontSize: 12 }}>Ответим в Telegram</div>
            </div>
            <button onClick={() => setChatOpen(false)} style={{ marginLeft: 'auto', background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer' }}>
              <Icon name="x" size={18} />
            </button>
          </div>

          <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 12 }}>
            {status === 'sent' ? (
              <div style={{ textAlign: 'center', padding: '24px 0' }}>
                <div style={{ fontSize: 36 }}>✅</div>
                <div style={{ fontWeight: 600, marginTop: 12 }}>Сообщение отправлено!</div>
                <div style={{ color: 'var(--text-muted)', fontSize: 14, marginTop: 6 }}>Мы свяжемся с вами в ближайшее время.</div>
                <button onClick={() => setStatus('idle')} className="btn btn-ghost" style={{ marginTop: 16, width: '100%', justifyContent: 'center' }}>Написать ещё</button>
              </div>
            ) : (
              <>
                <input value={name} onChange={e => setName(e.target.value)} placeholder="Ваше имя" style={inp} />
                <textarea value={msg} onChange={e => setMsg(e.target.value)} placeholder="Ваш вопрос..." rows={4}
                  style={{ ...inp, resize: 'vertical', lineHeight: 1.5 }} />
                {status === 'error' && (
                  <div style={{ color: '#ef4444', fontSize: 13 }}>Ошибка отправки. Попробуйте ещё раз.</div>
                )}
                <button onClick={sendChat} className="btn btn-primary"
                  style={{ width: '100%', justifyContent: 'center', opacity: status === 'sending' ? 0.7 : 1 }}
                  disabled={status === 'sending'}>
                  {status === 'sending' ? 'Отправка...' : <><Icon name="send" size={15} /> Отправить</>}
                </button>
              </>
            )}
          </div>
        </div>
      )}
    </header>
  );
};

const CarImage = ({ src, alt, label, style, className }) => {
  const [failed, setFailed] = useState(false);
  if (failed || !src) {
    return (
      <div className={'img-ph ' + (className || '')} style={style}>
        {(label || alt || 'CAR PHOTO').toUpperCase()}
      </div>
    );
  }
  return (
    <img src={src} alt={alt} loading="lazy"
         onError={() => setFailed(true)}
         style={style} className={'car-photo ' + (className || '')} />
  );
};

const InventoryPage = ({ onNav }) => {

  const [search, setSearch] = useState('');
  const [view, setView] = useState('grid');

  const filtered = useMemo(() => {
    let r = CARS.filter(c =>
      (brand === 'All' || c.brand === brand) &&
      (type === 'All' || c.type === type) &&
      (fuel === 'All' || c.fuel === fuel) &&
      c.price <= maxPrice &&
      (search === '' || (`${c.brand} ${c.model}`.toLowerCase().includes(search.toLowerCase())))
    );
    if (sort === 'price-asc') r = [...r].sort((a, b) => a.price - b.price);
    else if (sort === 'price-desc') r = [...r].sort((a, b) => b.price - a.price);
    else if (sort === 'year-desc') r = [...r].sort((a, b) => b.year - a.year);
    else if (sort === 'mileage-asc') r = [...r].sort((a, b) => a.mileage - b.mileage);
    return r;
  }, [brand, type, fuel, sort, maxPrice, search, CARS]);

  const reset = () => {
    setBrand('All'); setType('All'); setFuel('All'); setMaxPrice(100000); setSearch(''); setSort('featured');

  return (
    <div className="page-fade">
      <section style={{padding: '40px 0 24px'}}>
        <div className="container">
          <div style={iStyles.head}>

            <div style={iStyles.searchRow}>
              <div style={iStyles.searchBox}>
                <Icon name="search" size={18} />

            </div>

        </div>
      </section>

      <section style={{paddingBottom: 96}}>

                <div style={iStyles.filterHead}>
                  <h3 style={{margin: 0, fontSize: 18, fontWeight: 700}}>Filters</h3>
                  <button onClick={reset} style={iStyles.resetBtn}>Reset</button>
                </div>

                <FilterGroup label="Brand">
                  <Pills options={BRANDS} value={brand} onChange={setBrand} />

                <FilterGroup label="Body type">
                  <Pills options={TYPES} value={type} onChange={setType} />

                <FilterGroup label="Fuel">
                  <Pills options={FUELS} value={fuel} onChange={setFuel} />
                </FilterGroup>

                <FilterGroup label="Max price">
                  <div>
                    <input type="range" min={5000} max={100000} step={1000}

                           style={iStyles.range} />
                    <div style={{display: 'flex', justifyContent: 'space-between', marginTop: 10, fontSize: 13, color: 'var(--text-muted)'}}>
                      <span>$5K</span>
                      <span style={{color: 'var(--accent)', fontWeight: 600}}>up to {fmtMoney(maxPrice)}</span>
                      <span>$100K</span>
                    </div>
                  </div>
                </FilterGroup>

                <button className="btn btn-primary" style={{width: '100%', justifyContent: 'center', marginTop: 8}}>
                  Apply filters
                </button>
              </div>
            </aside>

            {/* Results */}

              <div style={iStyles.resultsHead}>

const Select = ({ value, options, onChange }) => {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  const cur = options.find(o => o.value === value);
  return (
    <div ref={ref} style={{position: 'relative'}}>
      <button onClick={() => setOpen(!open)} style={iStyles.selectBtn}>
        <span style={{color: 'var(--text-muted)', fontSize: 13}}>Sort:</span>
        <span style={{fontWeight: 600}}>{cur?.label}</span>
        <Icon name="chevronDown" size={14} />
      </button>
      {open && (
        <div style={iStyles.selectMenu}>
          {options.map(o => (
            <button key={o.value} onClick={() => { onChange(o.value); setOpen(false); }}
                    style={{...iStyles.selectItem, color: o.value === value ? 'var(--accent)' : 'var(--text)'}}>
              {o.label}
              {o.value === value && <Icon name="check" size={14} />}
            </button>
          ))}
        </div>
      )}
    </div>
  );
};

// === APP ===

function parseHash() {
  return window.location.hash.replace(/^#/, '') || '/';
}

function App() {
  const [route, setRoute] = useState(parseHash());
  const [theme, setTheme] = useState(() => localStorage.getItem('mk-theme') || 'dark');

  useEffect(() => {
    const onHash = () => setRoute(parseHash());
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('mk-theme', theme);
  }, [theme]);

  useEffect(() => {
    if (!route.includes('#')) window.scrollTo({ top: 0, behavior: 'instant' });
  }, [route]);

  const onNav = (path) => {
    if (path.includes('#') && path.startsWith('/#')) {
      window.location.hash = path;
      const id = path.split('#')[1];
      setTimeout(() => {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
      return;
    }
    window.location.hash = path;
  };

  let page;
  if (route.startsWith('/car/')) {
    const id = route.replace('/car/', '');
    page = <DetailPage carId={id} onNav={onNav} key={id} />;
  } else if (route.startsWith('/inventory')) {
    page = <InventoryPage onNav={onNav} />;
  } else {
    page = <HomePage onNav={onNav} />;
  }

  return (
    <>
      <Header route={route} onNav={onNav} theme={theme} setTheme={setTheme} />
      <main>{page}</main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
